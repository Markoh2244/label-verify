<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#081c15"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <circle cx="300" cy="180" r="70" fill="none" stroke="#95d5b2" stroke-width="2"/>
  <text x="300" y="175" text-anchor="middle" fill="#95d5b2" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">CRAFT BREWED</text>
  <text x="300" y="195" text-anchor="middle" fill="#d8f3dc" font-family="Arial, sans-serif" font-size="11">SINCE 2014</text>
  <text x="300" y="300" text-anchor="middle" fill="#d8f3dc" font-family="Impact, Arial Black, sans-serif" font-size="44">HARBOR HOP</text>
  <text x="300" y="350" text-anchor="middle" fill="#95d5b2" font-family="Arial, sans-serif" font-size="22" letter-spacing="6">IPA</text>
  <text x="300" y="400" text-anchor="middle" fill="#b7e4c7" font-family="Georgia, serif" font-size="16" font-style="italic">India Pale Ale</text>
  <text x="300" y="470" text-anchor="middle" fill="#d8f3dc" font-family="Arial, sans-serif" font-size="24" font-weight="bold">6.8% Alc./Vol.</text>
  <text x="300" y="530" text-anchor="middle" fill="#b7e4c7" font-family="Arial, sans-serif" font-size="20">12 fl oz</text>
  <text x="300" y="590" text-anchor="middle" fill="#95d5b2" font-family="Arial, sans-serif" font-size="12">Brewed and Bottled by</text>
  <text x="300" y="615" text-anchor="middle" fill="#d8f3dc" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Harbor Hop Brewing Co.</text>
  <text x="300" y="640" text-anchor="middle" fill="#95d5b2" font-family="Arial, sans-serif" font-size="12">Seattle, Washington 98101</text>
  <rect x="50" y="665" width="500" height="95" fill="#040e0a"/>
  <text x="300" y="688" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold">
    <tspan x="300" dy="0">GOVERNMENT WARNING: (1) According to the Surgeon General, women should not drink</tspan>
    <tspan x="300" dy="11">alcoholic beverages during pregnancy because of the risk of birth defects. (2) Consumption</tspan>
    <tspan x="300" dy="11">of alcoholic beverages impairs your ability to drive a car or operate machinery, and may</tspan>
    <tspan x="300" dy="11">cause health problems.</tspan>
  </text>
</svg>
