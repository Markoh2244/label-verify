<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810"/>
      <stop offset="100%" style="stop-color:#1a0f0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="50%" style="stop-color:#f4d03f"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect x="30" y="30" width="540" height="740" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <rect x="45" y="45" width="510" height="710" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <text x="300" y="120" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="14" letter-spacing="4">EST. 1887</text>
  <text x="300" y="200" text-anchor="middle" fill="#f4d03f" font-family="Georgia, serif" font-size="42" font-weight="bold" letter-spacing="2">OLD TOM</text>
  <text x="300" y="250" text-anchor="middle" fill="#f4d03f" font-family="Georgia, serif" font-size="36" font-weight="bold" letter-spacing="6">DISTILLERY</text>

  <line x1="150" y1="280" x2="450" y2="280" stroke="#c9a227" stroke-width="1"/>
  <text x="300" y="320" text-anchor="middle" fill="#e8d5b7" font-family="Georgia, serif" font-size="18" font-style="italic">Kentucky Straight Bourbon Whiskey</text>

  <text x="300" y="400" text-anchor="middle" fill="#c9a227" font-family="Arial, sans-serif" font-size="28" font-weight="bold">45% Alc./Vol.</text>
  <text x="300" y="435" text-anchor="middle" fill="#a89060" font-family="Arial, sans-serif" font-size="16">(90 Proof)</text>

  <text x="300" y="500" text-anchor="middle" fill="#e8d5b7" font-family="Arial, sans-serif" font-size="22">750 mL</text>

  <text x="300" y="560" text-anchor="middle" fill="#a89060" font-family="Arial, sans-serif" font-size="12">Distilled and Bottled by</text>
  <text x="300" y="580" text-anchor="middle" fill="#e8d5b7" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Old Tom Distillery Co.</text>
  <text x="300" y="600" text-anchor="middle" fill="#a89060" font-family="Arial, sans-serif" font-size="12">Louisville, Kentucky 40202</text>
  <text x="300" y="625" text-anchor="middle" fill="#a89060" font-family="Arial, sans-serif" font-size="11">Product of USA</text>

  <rect x="50" y="660" width="500" height="100" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="300" y="685" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="bold">
    <tspan x="300" dy="0">GOVERNMENT WARNING: (1) According to the Surgeon General, women should not drink</tspan>
    <tspan x="300" dy="12">alcoholic beverages during pregnancy because of the risk of birth defects. (2) Consumption</tspan>
    <tspan x="300" dy="12">of alcoholic beverages impairs your ability to drive a car or operate machinery, and may</tspan>
    <tspan x="300" dy="12">cause health problems.</tspan>
  </text>
</svg>
