  <rect x="50" y="665" width="500" height="95" fill="#14040a"/>
  <text x="300" y="688" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold">
    <tspan x="300" dy="0">GOVERNMENT WARNING: (1) According to the Surgeon General, women should not drink</tspan>
    <tspan x="300" dy="11">alcoholic beverages during pregnancy because of the risk of birth defects. (2) Consumption</tspan>
    <tspan x="300" dy="11">of alcoholic beverages impairs your ability to drive a car or operate machinery, and may</tspan>
    <tspan x="300" dy="11">cause health problems.</tspan>
