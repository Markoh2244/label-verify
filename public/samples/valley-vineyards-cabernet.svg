<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a0e1f"/>
      <stop offset="100%" stop-color="#1f0610"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect x="36" y="36" width="528" height="728" fill="none" stroke="#d4a5b5" stroke-width="1.5"/>
  <text x="300" y="120" text-anchor="middle" fill="#d4a5b5" font-family="Georgia, serif" font-size="13" letter-spacing="6">ESTATE BOTTLED</text>
  <text x="300" y="210" text-anchor="middle" fill="#f7e8ec" font-family="Georgia, serif" font-size="34" font-weight="bold">VALLEY VINEYARDS</text>
  <line x1="180" y1="240" x2="420" y2="240" stroke="#d4a5b5" stroke-width="1"/>
  <text x="300" y="300" text-anchor="middle" fill="#f0c7d2" font-family="Georgia, serif" font-size="26" font-style="italic">Cabernet Sauvignon</text>
  <text x="300" y="350" text-anchor="middle" fill="#d4a5b5" font-family="Georgia, serif" font-size="16">Napa Valley · 2021</text>
  <text x="300" y="430" text-anchor="middle" fill="#f7e8ec" font-family="Arial, sans-serif" font-size="24" font-weight="bold">13.5% Alc./Vol.</text>
  <text x="300" y="500" text-anchor="middle" fill="#f0c7d2" font-family="Arial, sans-serif" font-size="20">750 mL</text>
